name: Daily Automated Commit

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ⭐ THIS LINE FIXES ERROR 128

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 25ds3000057@ds.study.iitm.ac.in
        run: echo "Email included"

      - name: Create daily commit
        run: |
          echo "Updated on $(date)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "25ds3000057@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
