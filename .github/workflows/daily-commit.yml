name: Daily Automated Commit

on:
  schedule:
    - cron: '30 5 * * *'   # Runs daily at 05:30 UTC (11:00 AM IST)
  workflow_dispatch:       # allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 25ds3000057@ds.study.iitm.ac.in
        run: echo "Workflow running"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config --global user.name "DevSync Bot"
          git config --global user.email "25ds3000057@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update $(date)" || echo "No changes to commit"
          git push
